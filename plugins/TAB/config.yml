header-footer:
  enabled: true
  designs:
    default:
      header:
      - ''
      - '%animation:MyAnimation1%'
      - '&5&l✦ &d&lVOID SMP &5&l✦'
      - '%animation:MyAnimation1%'
      - ''
      - '&7Welcome, &d%player%'
      - '&7Online: &f%online% &8│ &7Ping: &f%ping%ms'
      - ''
      footer:
      - ''
      - '&7Rank: &f%group%'
      - ''
      - '%animation:discord-link%'
      - ''
tablist-name-formatting:
  enabled: true
scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
  - GROUPS:owner,admin,mod,helper,builder,mvp,vip,member
  - PLACEHOLDER_A_TO_Z:%player%
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
playerlist-objective:
  enabled: true
  value: '%ping%'
  fancy-value: '&7%ping%ms'
  title: Ping
  render-type: INTEGER
belowname-objective:
  enabled: true
  value: '%health%'
  fancy-value: '&c❤ %health%'
  fancy-value-default: NPC
  title: '&c❤'
prevent-spectator-effect:
  enabled: false
bossbar:
  enabled: false
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false
  bars: {}
scoreboard:
  enabled: true
  toggle-command: /sb
  remember-toggle-choice: true
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    main:
      title: '&5&l✦ &d&lVOID SMP &5&l✦'
      lines:
      - '&7&m              '
      - ' &8▸ &7Kills: &d%statistic_player_kills%'
      - ' &8▸ &7Deaths: &d%statistic_deaths%'
      - ' &8▸ &7Rank: &d%group%'
      - ''
      - ' &8▸ &7Online: &f%online%'
      - '&7&m              '
      - ' %animation:discord-link%'
layout:
  enabled: false
ping-spoof:
  enabled: false
  value: 0
global-playerlist:
  enabled: false
  update-latency: false
placeholders:
  date-format: dd.MM.yyyy
  time-format: HH:mm
  time-offset: 0
  register-tab-expansion: false
  locale: en-US
placeholder-output-replacements:
  '%essentials_vanished%':
    'yes': '&7| Vanished'
    'no': ''
conditions:
  nick:
    conditions:
    - '%player%=%essentials_nickname%'
    true: '%player%'
    false: ~%essentials_nickname%
placeholder-refresh-intervals:
  default-refresh-interval: 500
  '%player_health%': 200
  '%player_ping%': 1000
  '%vault_prefix%': 1000
assign-groups-by-permissions: false
primary-group-finding-list:
- owner
- admin
- mod
- helper
- mvp
- vip
- member
permission-refresh-interval: 1000
debug: false
mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
  useSSL: true
proxy-support:
  enabled: false
  channel-name-suffix: TAB
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: redis://:password@localhost:6379/0
  rabbitmq:
    exchange: plugin
    url: amqp://guest:guest@localhost:5672/%2F
components:
  minimessage-support: true
  disable-shadow-for-heads: true
config-version: 6
per-world-playerlist:
  enabled: false
  allow-bypass-permission: false
  ignore-effect-in-worlds: []
  shared-playerlist-world-groups: {}
compensate-for-packetevents-bug: false
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
groups:
  owner:
    tabprefix: '%animation:owner-tag% &4'
    tagprefix: '%animation:owner-tag% &4'
    tabsuffix: ''
  admin:
    tabprefix: '&c[Admin] &c'
    tagprefix: '&c[Admin] &c'
    tabsuffix: ''
  mod:
    tabprefix: '&9[Mod] &b'
    tagprefix: '&9[Mod] &b'
    tabsuffix: ''
  helper:
    tabprefix: '&e[Helper] &e'
    tagprefix: '&e[Helper] &e'
    tabsuffix: ''
  mvp:
    tabprefix: '&5[MVP] &5'
    tagprefix: '&5[MVP] &5'
    tabsuffix: ''
  vip:
    tabprefix: '&d[VIP] &d'
    tagprefix: '&d[VIP] &d'
    tabsuffix: ''
  member:
    tabprefix: '&7'
    tagprefix: '&7'
    tabsuffix: ''
